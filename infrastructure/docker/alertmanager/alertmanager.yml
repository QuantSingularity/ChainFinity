global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.chainfinity.com:587"
  smtp_from: "alerts@chainfinity.com"
  smtp_auth_username: "alerts@chainfinity.com"
  smtp_auth_password_file: /etc/alertmanager/smtp_password

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning-alerts"

receivers:
  - name: "default"
    email_configs:
      - to: "devops@chainfinity.com"
        send_resolved: true

  - name: "critical-alerts"
    email_configs:
      - to: "security@chainfinity.com,devops@chainfinity.com,admin@chainfinity.com"
        send_resolved: true
    pagerduty_configs:
      - service_key_file: /etc/alertmanager/pagerduty_key

  - name: "warning-alerts"
    email_configs:
      - to: "devops@chainfinity.com"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster", "service"]
