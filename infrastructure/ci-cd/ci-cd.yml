# ChainFinity CI/CD Pipeline Configuration
# GitHub Actions Workflow

name: ChainFinity CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  TERRAFORM_VERSION: "1.6.6"
  KUBECTL_VERSION: "1.28.0"
  AWS_REGION: "us-west-2"

jobs:
  validate-infrastructure:
    name: Validate Infrastructure Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -recursive -check

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate Kubernetes YAML
        working-directory: infrastructure/kubernetes
        run: |
          yamllint -c ../../.yamllint deployment.yaml
          yamllint -c ../../.yamllint backup/cronjob.yaml
          yamllint -c ../../.yamllint logging/elasticsearch.yaml
          yamllint -c ../../.yamllint monitoring/prometheus-config.yaml

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Validate Ansible Playbook
        working-directory: infrastructure/ansible
        run: ansible-lint playbook.yml

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: validate-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.18.0
        with:
          scan-type: "config"
          scan-ref: "infrastructure/"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate-infrastructure
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        run: terraform plan -var-file=terraform.tfvars.example -out=plan.out
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: infrastructure/terraform/plan.out
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [validate-infrastructure, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name chainfinity-cluster

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v${{ env.KUBECTL_VERSION }}

      - name: Deploy Kubernetes manifests
        working-directory: infrastructure/kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f backup/cronjob.yaml
          kubectl apply -f logging/elasticsearch.yaml
          kubectl apply -f monitoring/prometheus-config.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/chainfinity-frontend -n chainfinity --timeout=300s
          kubectl rollout status deployment/chainfinity-backend -n chainfinity --timeout=300s
