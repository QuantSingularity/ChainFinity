---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: chainfinity-monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: chainfinity-monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          repeat_interval: 1h
    receivers:
      - name: 'default'
        email_configs:
          - to: 'devops@chainfinity.com'
            from: 'alerts@chainfinity.com'
            smarthost: 'smtp.chainfinity.com:587'
            send_resolved: true
      - name: 'critical-alerts'
        email_configs:
          - to: 'security@chainfinity.com,devops@chainfinity.com'
            from: 'alerts@chainfinity.com'
            smarthost: 'smtp.chainfinity.com:587'
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'cluster', 'service']

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
  namespace: chainfinity-monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
spec:
  serviceName: alertmanager
  replicas: 2
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: monitoring
    spec:
      serviceAccountName: alertmanager
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          imagePullPolicy: IfNotPresent

          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --cluster.peer=alertmanager-0.alertmanager.chainfinity-monitoring.svc:9094
            - --cluster.peer=alertmanager-1.alertmanager.chainfinity-monitoring.svc:9094

          ports:
            - name: web
              containerPort: 9093
            - name: cluster
              containerPort: 9094

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: web
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /-/ready
              port: web
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: storage
              mountPath: /alertmanager
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: tmp
          emptyDir:
            sizeLimit: "100Mi"

  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: chainfinity-monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: web
    - name: cluster
      port: 9094
      targetPort: cluster
